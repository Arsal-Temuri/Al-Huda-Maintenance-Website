<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product/Service Requisition Form - Al Huda</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>Al Huda Product/Service Requisition Form</h1>
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="requestForm" enctype="multipart/form-data">
        <div class="form-group">
          <label for="department">Department Name *</label>
          <input type="text" id="department" name="department" required 
                 placeholder="e.g., Boys Hostel, Girls Section, Library">
        </div>

        <div class="form-group">
          <label for="requestType">Request Type *</label>
          <select id="requestType" name="requestType" required>
            <option value="">-- Select Type --</option>
            <option value="Plumbing">Plumbing</option>
            <option value="Electrical">Electrical</option>
            <option value="Repair">Repair</option>
            <option value="Cleaning">Cleaning</option>
            <option value="Carpentry">Carpentry</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="description">Description *</label>
          <textarea id="description" name="description" required 
                    placeholder="Please describe the issue in detail..."></textarea>
        </div>

        <div class="form-group">
          <label for="photo">Photo (Optional)</label>
          <input type="file" id="photo" name="photo" accept="image/*">
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Submit Request
        </button>
      </form>

      <div style="margin-top: 30px; text-align: center; color: #000; font-weight: bold;">
        <p>Are you an admin? <a href="/login.html" style="color: #000; font-weight: 800; text-decoration: underline; text-decoration-thickness: 2px;">Login here</a></p>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 style="text-align: center; color: #000; font-weight: 900;">Request Submitted Successfully!</h2>
      </div>
      <p style="text-align: center; color: #000; margin-bottom: 20px; font-weight: bold;">
        Your maintenance request has been submitted. Please save this request ID for tracking:
      </p>
      <div class="request-id" id="requestIdDisplay"></div>
      <div class="modal-footer" style="justify-content: center;">
        <button class="btn btn-primary" onclick="closeModalAndReset()">Submit Another Request</button>
      </div>
    </div>
  </div>

  <script src="/js/request.js"></script>
</body>
</html>
